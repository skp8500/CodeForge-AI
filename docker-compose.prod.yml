# Production stack — all services behind nginx.
# Run from repo root:
#   docker-compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   1. Build images first: make build-images
#   2. Create a .env.prod file with all required env vars (see .env.example)
#   3. Mount Docker socket for judge-worker: already wired via volumes below

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codeforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-codeforge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codeforge} -d ${POSTGRES_DB:-codeforge}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    image: codeforge-api:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-codeforge}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-codeforge}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      MAIL_HOST: ${MAIL_HOST:-smtp.sendgrid.net}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-apikey}
      MAIL_PASS: ${MAIL_PASS:?MAIL_PASS is required}
      MAIL_FROM: ${MAIL_FROM:-noreply@codeforge.dev}
      APP_URL: ${APP_URL:-http://localhost}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: codeforge-worker:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-codeforge}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-codeforge}
      REDIS_URL: redis://redis:6379
    volumes:
      # Docker socket — required for judge-worker to spawn execution containers
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: codeforge-web:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${APP_URL:-http://localhost}/api/v1
      NEXT_PUBLIC_WS_URL: ${APP_URL:-http://localhost}
    networks:
      - internal
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount TLS certs if using HTTPS (e.g., via certbot):
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - internal
    depends_on:
      - api
      - web

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
